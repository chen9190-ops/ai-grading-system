name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production

    steps:
      - name: Checkout deployment commit
        uses: actions/checkout@v4

      - name: Validate deployment scripts
        run: |
          bash -n deploy.sh update.sh scripts/*.sh scripts/lib/*.sh

      - name: Validate application build
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Deploy exact commit over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.ECS_HOST }}
          port: 22
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: PROJECT_DIR,DEPLOY_SHA
          debug: true
          script: |
            set -Eeuo pipefail

            : "${PROJECT_DIR:?GitHub secret PROJECT_DIR is required}"
            : "${DEPLOY_SHA:?DEPLOY_SHA is required}"

            cd "$PROJECT_DIR"
            test -d .git
            test -f .env.production

            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            git fetch --prune origin main
            git cat-file -e "${DEPLOY_SHA}^{commit}"
            git reset --hard "$DEPLOY_SHA"

            PREVIOUS_COMMIT="$PREVIOUS_COMMIT" \
            TARGET_COMMIT="$DEPLOY_SHA" \
            APP_DIR="$PROJECT_DIR" \
              bash scripts/deploy-release.sh
